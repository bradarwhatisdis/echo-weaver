name: Build Echo Weaver

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build-java:
    name: Build Java (Fabric)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: echoweaver-fabric
          path: java/build/libs/*.jar
          if-no-files-found: error

  build-bedrock:
    name: Build Bedrock Add-On
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package Behavior Pack
        run: |
          cd bedrock/behavior_pack
          zip -r ../../echoweaver-bp.zip ./*

      - name: Package Resource Pack
        run: |
          cd bedrock/resource_pack
          zip -r ../../echoweaver-rp.zip ./*

      - name: Create .mcaddon
        run: |
          zip -j echoweaver.mcaddon echoweaver-bp.zip echoweaver-rp.zip

      - name: Upload .mcaddon
        uses: actions/upload-artifact@v4
        with:
          name: echoweaver-bedrock
          path: echoweaver.mcaddon
          if-no-files-found: error

  publish:
    if: github.event_name == 'release'
    needs: [build-java, build-bedrock]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Java artifact
        uses: actions/download-artifact@v4
        with:
          name: echoweaver-fabric
          path: release/

      - name: Download Bedrock artifact
        uses: actions/download-artifact@v4
        with:
          name: echoweaver-bedrock
          path: release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
